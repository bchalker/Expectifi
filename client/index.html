    <script>
      (function () {
        try {
          var APP_KEY = 'retirement-calculator/app-state-v1';
          var FID_KEY = 'retirement-calculator/fidelity-import-v1';
          var has = false;
          var raw = localStorage.getItem(APP_KEY);
          if (raw) {
            var snap = JSON.parse(raw);
            var inp = snap && snap.inputs;
            if (inp) {
              var ret =
                (Number(inp.base401k) || 0) +
                (Number(inp.baseSE401k) || 0) +
                (Number(inp.baseTradIRA) || 0) +
                (Number(inp.baseRoth) || 0) +
                (Number(inp.baseHsa) || 0);
              if (ret > 0 || (Number(inp.brkBal) || 0) > 0) has = true;
            }
          }
          if (!has) {
            var fidRaw = localStorage.getItem(FID_KEY);
            if (fidRaw) {
              var fid = JSON.parse(fidRaw);
              var batches = fid && fid.batches;
              if (Array.isArray(batches) && batches.length > 0) has = true;
              var bal = fid && fid.balances;
              if (bal) {
                var sum =
                  (Number(bal.base401k) || 0) +
                  (Number(bal.baseSE401k) || 0) +
                  (Number(bal.baseRoth) || 0) +
                  (Number(bal.baseHsa) || 0) +
                  (Number(bal.brkBal) || 0);
                if (sum > 0) has = true;
              }
            }
          }
          if (has) document.documentElement.removeAttribute('data-no-portfolio-subheader');
        } catch (e) {
          /* keep default collapsed subheader */
        }
      })();
    </script>
