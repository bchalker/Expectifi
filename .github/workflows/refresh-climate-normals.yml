name: Refresh climate normals

# Full ~922-city NASA POWER refresh takes ~16 minutes (one request/city).
# Daily cron was removed — Open-Meteo needed ~33 cities/day due to weighted-call limits.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh climate normals (full NASA POWER run)
        run: node scripts/refresh-climate-normals.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet client/src/data/climate-normals.json; then
            echo "No changes to climate-normals.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add client/src/data/climate-normals.json
            git commit -m "chore: refresh climate normals from NASA POWER"
            git push
          fi
